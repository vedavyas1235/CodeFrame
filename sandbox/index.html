<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CodeFrame Sandbox</title>
  <script>
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'render-sandbox') {
        
        const trackerScript = '<scr' + 'ipt>' + `
          window.addEventListener('load', function() {
            window.parent.postMessage({ type: 'sandbox-loaded' }, '*');
          });
          setTimeout(function() {
             if (document.readyState === 'complete') {
               window.parent.postMessage({ type: 'sandbox-loaded' }, '*');
             }
          }, 100);
        ` + '</scr' + 'ipt>';
        
        document.open();
        document.write(e.data.html + trackerScript);
        document.close();
      }
    });
    window.parent.postMessage({ type: 'sandbox-ready' }, '*');
  </script>
</head>
<body></body>
</html>
