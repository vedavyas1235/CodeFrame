<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CodeFrame Sandbox</title>
  <script>
    // Listen for the HTML from CodeFrame
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'render-sandbox') {
        
        // Wait for all injected assets to finish downloading/painting
        window.addEventListener('load', function() {
          window.parent.postMessage({ type: 'sandbox-loaded' }, '*');
        }, { once: true });
        
        document.open();
        document.write(e.data.html);
        document.close();
      }
    });
    // Tell CodeFrame we are ready to receive HTML
    window.parent.postMessage({ type: 'sandbox-ready' }, '*');
  </script>
</head>
<body></body>
</html>
