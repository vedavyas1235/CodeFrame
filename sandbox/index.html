<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CodeFrame Sandbox</title>
  <script>
    // Listen for the HTML from CodeFrame
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'render-sandbox') {
        // Optionally verify origin here if strictly needed
        // if (!e.origin.includes('codeframe.com') && !e.origin.includes('localhost')) return;
        
        document.open();
        document.write(e.data.html);
        document.close();
      }
    });
    // Tell CodeFrame we are ready to receive HTML
    window.parent.postMessage({ type: 'sandbox-ready' }, '*');
  </script>
</head>
<body></body>
</html>
